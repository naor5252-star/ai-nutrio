name: Validate and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies with retry
        shell: bash
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"

            if npm ci --no-audit --no-fund; then
              exit 0
            fi

            echo "Installation failed. Cleaning and retrying..."
            rm -rf node_modules
            npm cache clean --force || true
            sleep $((attempt * 15))
          done

          exit 1

      - run: npm run ci

      - name: Install WebKit
        run: npx playwright install --with-deps webkit

      - run: npm run test:e2e

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Install dependencies with retry
        shell: bash
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"

            if npm ci --no-audit --no-fund; then
              exit 0
            fi

            echo "Installation failed. Cleaning and retrying..."
            rm -rf node_modules
            npm cache clean --force || true
            sleep $((attempt * 15))
          done

          exit 1

      - name: Inject production resource identifiers
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
        run: node scripts/configure-production.mjs

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ai-nutrition-advisor-db --remote --config wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker and static assets
        run: npx wrangler deploy --config wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
