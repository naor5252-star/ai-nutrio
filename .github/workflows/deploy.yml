name: Validate and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci
      - run: npx playwright install --with-deps webkit
      - run: npm run test:e2e

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inject production resource identifiers
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
        run: node scripts/configure-production.mjs
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ai-nutrition-advisor-db --remote --config wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker and static assets
        run: npx wrangler deploy --config wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
